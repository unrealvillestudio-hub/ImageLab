    <style>
      @import url('https://fonts.googleapis.com/css2?family=Anton&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
      body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        background-color: #050505;

      }
      .brand-name {
        font-family: 'Anton', sans-serif;

      }
      .topaz-gradient {
        background: linear-gradient(135deg, #FFAB00 0%, #FFD77A 100%);
      }
      .bg-checkered {
        background-image: 
          linear-gradient(45deg, #090909 25%, transparent 25%), 
          linear-gradient(-45deg, #090909 25%, transparent 25%), 
          linear-gradient(45deg, transparent 75%, #090909 75%), 
          linear-gradient(-45deg, transparent 75%, #090909 75%);
        background-size: 32px 32px;
        background-position: 0 0, 0 16px, 16px -16px, -16px 0px;
        background-color: #050505;
      }
      .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 171, 0, 0.1); border-radius: 10px; }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(255, 171, 0, 0.3); }
      
      .cursor-grab { cursor: grab; }
      .cursor-grabbing { cursor: grabbing; }
    </style>
